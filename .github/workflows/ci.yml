name: Python CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt
      - run: python app.py
      - run: pytest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-output
          path: .